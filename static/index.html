<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
var lang = localStorage.getItem('atman-lang');
if (!lang) {
  var nav = navigator.language || navigator.userLanguage || 'en';
  lang = nav.toLowerCase().startsWith('ru') ? 'ru' : 'en';
  localStorage.setItem('atman-lang', lang);
}
// Support both root domain and GitHub Pages subpath
var base = window.location.pathname.replace(/\/$/, '');
window.location.replace(base + '/' + lang + '/');
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=ru/" />
</noscript>
</head>
<body></body>
</html>
