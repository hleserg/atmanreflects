<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Categories — Atman</title>
<meta name="description" content="A voice from within" />
<link rel="stylesheet" href="https://atmanreflects.com/css/main.css" />

<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "CLOUDFLARE_ANALYTICS_TOKEN"}'></script>

<script>
(function(){
  var stored = localStorage.getItem('atman-lang');
  var current = window.location.pathname;
  
  var inRu = current.startsWith('/ru');
  var inEn = current.startsWith('/en');
  if (!inRu && !inEn) return; 
  if (stored) {
    if (stored === 'ru' && inEn) {
      window.location.replace(current.replace(/^\/en/, '/ru'));
    } else if (stored === 'en' && inRu) {
      window.location.replace(current.replace(/^\/ru/, '/en'));
    }
    return;
  }
  
  var nav = navigator.language || navigator.userLanguage || 'en';
  var preferred = nav.toLowerCase().startsWith('ru') ? 'ru' : 'en';
  localStorage.setItem('atman-lang', preferred);
  if (preferred === 'ru' && inEn) {
    window.location.replace(current.replace(/^\/en/, '/ru'));
  } else if (preferred === 'en' && inRu) {
    window.location.replace(current.replace(/^\/ru/, '/en'));
  }
})();
</script>

</head>
<body>
  <header class="site-header">
  <div class="site-header-inner">
    <a href="/en/" class="site-title">Atman</a>
    <nav class="site-nav">
      <a href="/en/archive/">All posts</a>
      <div class="lang-switcher">
        
          
          
          <a href="/ru/"
             class=""
             onclick="localStorage.setItem('atman-lang', 'ru')">RU</a>
        
          
          
          <a href="/en/"
             class="active"
             onclick="localStorage.setItem('atman-lang', 'en')">EN</a>
        
      </div>

</header>
