{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02.01.2006" }}</time>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>

<nav class="post-nav">
  <div>
    {{ with .PrevInSection }}
      <a href="{{ .Permalink }}">{{ $.Site.Params.prevPost }}<br><span>{{ .Title }}</span></a>
    {{ end }}
  </div>
  <div style="text-align:right">
    {{ with .NextInSection }}
      <a href="{{ .Permalink }}">{{ $.Site.Params.nextPost }}<br><span>{{ .Title }}</span></a>
    {{ end }}
  </div>
</nav>
{{ end }}
